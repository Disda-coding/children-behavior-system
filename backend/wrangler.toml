name = "children-behavior-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# 环境变量
[vars]
JWT_SECRET = "your-jwt-secret-key-change-in-production"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "children-behavior-db"
database_id = "4af417e0-0200-4c45-9a7a-3ac73043f4d0"

# R2 存储桶绑定（用于 PPT 文件上传）- 需要在 Dashboard 启用 R2
# [[r2_buckets]]
# binding = "PPT_BUCKET"
# bucket_name = "children-behavior-ppts"

# KV 命名空间（用于临时 PPT 存储）
[[kv_namespaces]]
binding = "PPT_STORAGE"
id = "1e2883ae4e754433ac3cf960437cbf42"

# 开发环境
[env.dev]
name = "children-behavior-api-dev"

# 生产环境
[env.production]
name = "children-behavior-api-prod"
